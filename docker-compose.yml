services:
  postgres:
    image: postgres:16-alpine
    container_name: inseries-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inseries
      POSTGRES_PASSWORD: inseries
      POSTGRES_DB: inseries
    ports:
      - "5433:5432"
    volumes:
      - inseries-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inseries -d inseries"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inseries-postgres-data:
